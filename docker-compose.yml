services:
  postgres:
    image: postgres:16
    container_name: nest_commerce_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nest_commerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nest_commerce"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
